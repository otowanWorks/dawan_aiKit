<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>友達AI：だわん</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="app">

        <!-- AI吹き出しエリア -->
        <div id="aiResponseArea">
            <div id="aiResponse" class="aiResponseBox">
                <div class="ai-response" id="aiResponseUtterance"></div>
            </div>
        </div>

        <!-- キャラクターエリア -->
        <div id="vtuber">
            <img id="charaImg" src="image/character001.png" alt="Character" />
        </div>

        <!-- ユーザーコメント -->
        <div id="userComment"></div>

        <!-- 入力フォーム -->
        <div class="bottomBox">
            <div id="submit_form">
                <input type="text" id="utterance" placeholder="メッセージを入力してください..." />
                <button id="sendButton" onclick="onClickSend();">送信</button>
                <button id="voiceButton" onclick="toggleVoiceInput();" title="音声入力">🎤</button>
                <button id="menuButton" onclick="toggleHamburgerMenu();" title="定型文メニュー">≡</button>
                <div id="hamburgerMenu"></div>
            </div>
        </div>

    </div>

    <script src="js/sound.js"></script>
    <script src="js/greeting.js"></script>
    <script src="js/keyword.js"></script>
    <script src="js/quick_reply.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
